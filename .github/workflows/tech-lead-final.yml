name: "👨‍💻 Tech Lead - Final Review & Merge"

on:
  issue_comment:
    types: [created]

jobs:
  tech-lead-final-review:
    if: |
      contains(github.event.issue.labels.*.name, 'assigned-tech-lead-final') &&
      contains(github.event.comment.body, '🧪 QA Engineer')
    runs-on: ubuntu-latest
    name: "👨‍💻 Tech Lead - Final Review & Approval"
    steps:
      - uses: actions/checkout@v4

      - name: Tech Lead Final Review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Final Approval Process
        run: |
          echo "👨‍💻 Tech Lead: Conducting final review..."
          echo "✅ QA test results reviewed: All passed"
          echo "✅ Code quality verified: Meets standards"
          echo "✅ Architecture compliance: Confirmed"
          echo "✅ Security review: Approved"
          echo "✅ Performance benchmarks: Met"
          echo "🎯 APPROVED FOR PRODUCTION DEPLOYMENT!"

      - name: Update Assignment to DevOps
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'assigned-tech-lead-final'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['assigned-devops', 'status-deployment', 'approved-production']
            });

      - name: Tech Lead Final Approval
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: |
                ## 👨‍💻 Tech Lead - Final Approval ✅

                **Status:** 🎉 APPROVED FOR PRODUCTION DEPLOYMENT
                **Assignment:** Passed to DevOps for deployment

                ### Final Review Summary:
                - ✅ QA Results Verified: All testing passed successfully
                - ✅ Code Quality: Meets all technical standards
                - ✅ Architecture Compliance: Follows established patterns
                - ✅ Security Clearance: No security concerns identified
                - ✅ Performance Validation: Meets performance requirements
                - ✅ Documentation: Complete and up-to-date

                ### Deployment Authorization:
                🚀 CLEARED FOR PRODUCTION DEPLOYMENT

                Next Phase: DevOps Deployment & Monitoring 🚀

                ---
                _🤖 Virtual IT Company Tech Lead - Final Approval_
            });
