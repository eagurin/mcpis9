name: Gemini Specialized Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  gemini-task-agent:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gemini')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@gemini') || contains(github.event.issue.title, '@gemini'))) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.body, '@gemini'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai python-dotenv PyGithub

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install gh -y

      - name: Run Gemini Task Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > gemini_agent.py << 'EOF'
          #!/usr/bin/env python3
          import os
          import sys
          import json
          import google.generativeai as genai
          from github import Github

          # Настройка Gemini API
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-1.5-pro')

          # Настройка GitHub API
          g = Github(os.environ['GITHUB_TOKEN'])

          def get_issue_context():
              """Получить контекст из GitHub события"""
              context = {}

              if os.environ.get('GITHUB_EVENT_NAME') == 'issues':
                  event_path = os.environ.get('GITHUB_EVENT_PATH')
                  if event_path and os.path.exists(event_path):
                      with open(event_path, 'r') as f:
                          event_data = json.load(f)
                      context = {
                          'type': 'issue',
                          'title': event_data.get('issue', {}).get('title', ''),
                          'body': event_data.get('issue', {}).get('body', ''),
                          'number': event_data.get('issue', {}).get('number', 0),
                          'labels': [label['name'] for label in event_data.get('issue', {}).get('labels', [])]
                      }

              return context

          def analyze_and_respond(context):
              """Анализ задачи и подготовка ответа"""
              prompt = f"""
              Вы - Gemini агент для автоматизации задач в проекте MCPIS9.

              Проект: Python 3.12+ FastAPI сервер с MCP протоколом
              Специализация:
              - Обработка и категоризация тикетов
              - Автоматизация рутинных задач
              - Управление проектом и планирование
              - Анализ и тестирование

              Контекст задачи:
              Тип: {context.get('type', 'unknown')}
              Заголовок: {context.get('title', '')}
              Описание: {context.get('body', '')}
              Номер: {context.get('number', 0)}
              Метки: {context.get('labels', [])}

              Проанализируйте задачу и предложите:
              1. Категоризацию (bug, feature, enhancement, documentation, etc.)
              2. Приоритет (high, medium, low)
              3. Рекомендуемые действия
              4. Предложения по меткам

              Ответ дайте в формате JSON.
              """

              try:
                  response = model.generate_content(prompt)
                  return response.text
              except Exception as e:
                  return f"Ошибка анализа: {str(e)}"

          def main():
              context = get_issue_context()
              if context:
                  analysis = analyze_and_respond(context)
                  print("🤖 Анализ Gemini агента:")
                  print(analysis)
              else:
                  print("📋 Gemini агент готов к работе, но нет контекста для анализа")

          if __name__ == "__main__":
              main()
          EOF

          python gemini_agent.py

      - name: Apply labels based on analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Применение меток на основе анализа Gemini
          if [ "${{ github.event_name }}" == "issues" ]; then
            echo "🏷️ Применение рекомендованных меток..."
            # Здесь можно добавить логику применения меток
          fi

  gemini-automation:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini-auto')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gemini-auto'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai python-dotenv

      - name: Run Gemini Automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > gemini_automation.py << 'EOF'
          #!/usr/bin/env python3
          import os
          import google.generativeai as genai

          # Настройка Gemini API
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-1.5-pro')

          def run_automation():
              """Запуск автоматизированных задач"""
              prompt = """
              Вы - Gemini агент автоматизации для проекта MCPIS9.

              Выполните следующие автоматические проверки:
              1. Проверьте структуру проекта
              2. Проанализируйте файлы конфигурации
              3. Предложите улучшения автоматизации

              Проект использует:
              - Python 3.12+ с FastAPI
              - UV для управления пакетами
              - Pytest для тестирования
              - GitHub Actions для CI/CD

              Дайте рекомендации по улучшению.
              """

              try:
                  response = model.generate_content(prompt)
                  return response.text
              except Exception as e:
                  return f"Ошибка автоматизации: {str(e)}"

          def main():
              print("🔄 Запуск автоматизации Gemini...")
              result = run_automation()
              print(result)

          if __name__ == "__main__":
              main()
          EOF

          python gemini_automation.py
