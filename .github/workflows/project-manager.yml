name: "🧑‍💼 Project Manager - Issue Triage"

on:
  issues:
    types: [opened, edited]

jobs:
  project-manager-triage:
    runs-on: ubuntu-latest
    name: "🧑‍💼 Project Manager - Issue Triage & Assignment"
    steps:
      - uses: actions/checkout@v4

      - name: Project Manager Analysis
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assign Labels and Team
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = ['status-triage', 'assigned-tech-lead'];

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labels
            });

      - name: Project Manager Status Update
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: |
                ## 🧑‍💼 Project Manager - Issue Processed

                **Status:** ✅ Issue triaged and assigned to Tech Lead
                **Priority:** Normal
                **Assignment:** Tech Lead for technical analysis

                ### Next Steps:
                1. Tech Lead will analyze technical requirements
                2. Developer will implement the solution
                3. QA Engineer will test and validate
                4. DevOps will handle deployment

                **Workflow Status:** Assigned to Tech Lead 📋

                ---
                _🤖 Virtual IT Company Project Manager_
            });
