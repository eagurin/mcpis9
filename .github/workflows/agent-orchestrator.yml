name: Agent Orchestrator

on:
  issue_comment:
    types: [created]

jobs:
  orchestrator:
    if: contains(github.event.comment.body, '@agent')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Call Gemini Agent
        if: contains(github.event.comment.body, 'gemini') || !contains(github.event.comment.body, 'claude')
        id: gemini
        uses: google-gemini/gemini-cli-action@main
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: "${{ github.event.comment.body }}"

      - name: Process Gemini Output
        id: process_gemini_output
        if: (contains(github.event.comment.body, 'gemini') || !contains(github.event.comment.body, 'claude')) && steps.gemini.outputs.stdout
        run: |
          output="${{ steps.gemini.outputs.stdout }}"
          processed_output=$(echo "$output" | sed 's/^.*is //')
          echo "reply=$processed_output" >> "$GITHUB_OUTPUT"

      - name: Comment on issue
        if: (contains(github.event.comment.body, 'gemini') || !contains(github.event.comment.body, 'claude')) && steps.gemini.outputs.stdout
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: ${{ steps.process_gemini_output.outputs.reply }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Call Claude Agent
        if: contains(github.event.comment.body, 'claude')
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: ${{ github.event.comment.body }}
