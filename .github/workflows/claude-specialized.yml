name: Claude Specialized Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  claude-code-agent:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-code')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-code')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude-code') || contains(github.event.issue.title, '@claude-code'))) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.body, '@claude-code'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Agent
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          custom_instructions: |
            Вы специализированный Claude агент для работы с кодом MCPIS9.

            Специализация:
            - Код-ревью и анализ качества кода
            - Рефакторинг и архитектурные улучшения
            - Исправление багов и оптимизация
            - Соблюдение стандартов Python/FastAPI

            Контекст проекта:
            - Python 3.12+ с FastAPI
            - MCP (Model Context Protocol) сервер
            - Интеграция с GitHub API через PyGithub
            - Используется UV для управления пакетами
            - Pytest для тестирования
            - Ruff для линтинга и форматирования

            Команды разработки:
            - make lint - запуск линтинга
            - make test - запуск тестов
            - make check - все проверки качества
            - make types - проверка типов

            Триггер: @claude-code
          allowed_tools: "Bash(make *),Bash(uv *),Bash(pytest *),Bash(ruff *),Bash(pyright *)"

  claude-base-agent:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-base')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-base')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude-base') || contains(github.event.issue.title, '@claude-base'))) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.body, '@claude-base'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Base Agent
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt: |
            Вы специализированный Claude агент для базовых задач MCPIS9.

            Анализируйте запрос и выполните соответствующие действия:
            - Анализ кода и документации
            - Рефакторинг и улучшения
            - Создание тестов
            - Обновление документации

            Контекст: Python 3.12+ FastAPI проект с MCP протоколом

            Триггер: @claude-base
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(make *),Bash(uv *),Bash(pytest *),View,GlobTool,EditTool"
          claude_env: |
            PROJECT_TYPE: mcpis9
            PYTHON_VERSION: 3.12
