name: Claude API Testing & Quality Assurance

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "app/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
  push:
    branches: [ main, develop ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  comprehensive-testing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Comprehensive API Testing
        id: api-testing
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt: |
            Execute comprehensive API testing and quality assurance for this FastAPI project:

            ## Testing Strategy
            1. **Infrastructure Setup**
               - Set up Python 3.12 environment with UV
               - Install all dependencies including dev dependencies
               - Validate project structure and configuration

            2. **Static Analysis & Code Quality**
               - Run linting with ruff (make lint)
               - Perform type checking with pyright (make types)
               - Check security vulnerabilities with bandit (make security)
               - Verify code formatting compliance

            3. **Unit & Integration Testing**
               - Execute full test suite (make test)
               - Generate coverage reports (make coverage)
               - Test individual components and endpoints
               - Validate error handling and edge cases

            4. **API Endpoint Testing**
               - Test all FastAPI endpoints if they exist
               - Validate request/response schemas
               - Check authentication and authorization
               - Test rate limiting and performance

            5. **Performance & Load Testing**
               - Basic performance benchmarks
               - Memory usage analysis
               - Startup time validation

            6. **Documentation & Compliance**
               - Verify API documentation is up to date
               - Check README and deployment guides
               - Validate environment configuration

            ## Output Requirements
            - Detailed test results with pass/fail status
            - Coverage percentage and areas needing improvement
            - Performance metrics and recommendations
            - List of any issues found with severity levels
            - Suggestions for improvement

            Focus on providing actionable feedback for this Python FastAPI MCP server project.

          allowed_tools: |
            Bash(make setup)
            Bash(make install)
            Bash(make dev)
            Bash(make lint)
            Bash(make fix)
            Bash(make types)
            Bash(make test)
            Bash(make test-fast)
            Bash(make test-watch)
            Bash(make coverage)
            Bash(make security)
            Bash(make check)
            Bash(make run)
            Bash(uv install)
            Bash(uv run pytest)
            Bash(uv run pytest --cov)
            Bash(uv run pytest --cov-report=html)
            Bash(uv run ruff check)
            Bash(uv run ruff format)
            Bash(uv run pyright)
            Bash(uv run bandit)
            Bash(uvicorn app.main:app --reload)
            Bash(curl -s http://localhost:8000/health)
            Bash(python -m pytest)
            View
            GlobTool
            GrepTool
            Edit
            Write

          claude_env: |
            PYTHON_VERSION: 3.12
            UV_PYTHON: 3.12
            PYTHONPATH: /github/workspace
            CI: true
            TESTING: true
            COVERAGE_REPORT: true
            PYTEST_TIMEOUT: 300
            UVICORN_HOST: 0.0.0.0
            UVICORN_PORT: 8000

          system_prompt: |
            You are a senior QA engineer and Python testing expert specializing in FastAPI applications.
            Your goal is to ensure comprehensive testing coverage and code quality.

            Execute tests systematically:
            1. Infrastructure → Static Analysis → Unit Tests → Integration Tests → Performance
            2. Always run 'make check' to execute all quality checks
            3. Generate detailed reports with actionable recommendations
            4. Identify security vulnerabilities and performance bottlenecks
            5. Provide specific code improvements where needed

            Be thorough but efficient - focus on practical, actionable results.

          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: "claude-3-5-sonnet-20241022"
          fallback_model: "claude-3-5-sonnet-20241022"
          max_turns: "15"
          timeout_minutes: "25"

          # Security restrictions
          disallowed_tools: |
            Bash(rm:*)
            Bash(sudo:*)
            Bash(chmod:*)
            Bash(kill:*)
            TaskOutput
            KillTask

      - name: Process Test Results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Get execution results
            const executionFile = '${{ steps.api-testing.outputs.execution_file }}';
            const conclusion = '${{ steps.api-testing.outputs.conclusion }}';

            let testResults = '';
            let summary = '';

            if (fs.existsSync(executionFile)) {
              const executionLog = JSON.parse(fs.readFileSync(executionFile, 'utf8'));

              // Extract test results from the last assistant message
              for (let i = executionLog.length - 1; i >= 0; i--) {
                if (executionLog[i].role === 'assistant') {
                  testResults = executionLog[i].content;
                  break;
                }
              }
            }

            // Determine status and emoji
            const isSuccess = conclusion === 'success';
            const statusEmoji = isSuccess ? '✅' : '❌';
            const statusText = isSuccess ? 'PASSED' : 'FAILED';

            // Create summary
            summary = `## 🧪 API Testing & QA Report - ${statusEmoji} ${statusText}

            **Execution Status**: ${statusText}
            **Workflow**: Comprehensive API Testing
            **Python Version**: 3.12
            **Framework**: FastAPI with UV package management

            ---

            ${testResults || 'Testing execution completed but detailed results are not available.'}

            ---

            **Next Steps**:
            ${isSuccess ?
              '- ✅ All tests passed! Ready for deployment\n- Consider adding performance monitoring\n- Review coverage reports for improvement opportunities' :
              '- ❌ Issues found - please review and fix\n- Re-run tests after fixes\n- Consider additional test coverage'
            }

            *Generated by Claude Code API Testing & QA*`;

            // Post comment on PR or commit
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            } else if (context.payload.commits) {
              // For push events, create a commit comment
              const sha = context.payload.after;
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
                body: summary
              });
            }

            // Set job summary
            await core.summary
              .addHeading(`API Testing Results - ${statusText}`)
              .addRaw(testResults || 'No detailed results available')
              .write();

      - name: Archive Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            htmlcov/
            .coverage
            pytest-report.xml
            test-results.json
          retention-days: 30
          if-no-files-found: ignore
