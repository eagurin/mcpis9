name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive analysis

      - name: Run Code Review with Claude
        id: code-review
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt: |
            Perform a comprehensive code review of this Python FastAPI MCP server project PR.

            ## Review Focus Areas

            ### 1. Code Quality & Standards
            - Python 3.12+ best practices and modern patterns
            - PEP 8 compliance and code style consistency
            - Type hints and pyright compatibility
            - Docstring quality and documentation
            - Import organization and dependencies

            ### 2. FastAPI & MCP Server Architecture
            - FastAPI best practices and patterns
            - MCP (Model Context Protocol) implementation
            - API endpoint design and RESTful principles
            - Request/response models and validation
            - Error handling and status codes

            ### 3. Security & Performance
            - Security vulnerabilities and best practices
            - Input validation and sanitization
            - Performance considerations and optimizations
            - Memory usage and resource management
            - Async/await usage and I/O operations

            ### 4. Testing & Reliability
            - Test coverage and quality
            - Edge case handling
            - Error scenarios and exception handling
            - Integration test completeness
            - Mock usage and test isolation

            ### 5. Development Workflow
            - UV package management usage
            - Makefile command compatibility
            - CI/CD pipeline considerations
            - Environment configuration
            - Logging and monitoring

            ## Instructions
            - Analyze the specific changes in this PR
            - Provide constructive, actionable feedback
            - Include code examples for suggestions
            - Prioritize critical issues over minor style points
            - Consider maintainability and scalability
            - Suggest improvements with rationale

            ## Output Format
            Use markdown with clear sections:
            - **Summary**: Brief overview of the changes
            - **Critical Issues**: Security/functionality problems
            - **Improvements**: Code quality suggestions
            - **Positive Notes**: Good practices observed
            - **Recommendations**: Next steps and follow-ups

            Focus on helping the developer improve while maintaining code quality standards.

          allowed_tools: |
            Bash(git:diff)
            Bash(git:show)
            Bash(git:log)
            Bash(git:status)
            Bash(find:*)
            Bash(grep:*)
            Bash(make:lint)
            Bash(make:types)
            Bash(make:security)
            Bash(make:check)
            Bash(uv:run)
            Bash(pytest:--collect-only)
            Bash(tree:*)
            View
            GlobTool
            GrepTool
            Edit
            Write

          claude_env: |
            PYTHON_VERSION: 3.12
            UV_PYTHON: 3.12
            PYTHONPATH: /github/workspace
            CI: true
            REVIEW_MODE: true
            PROJECT_TYPE: MCP_SERVER
            FRAMEWORK: FastAPI
            PACKAGE_MANAGER: UV

          system_prompt: |
            You are a senior Python code reviewer with expertise in FastAPI and MCP servers.
            Your role is to provide thorough, constructive code reviews that help developers
            improve their code quality while maintaining high standards.

            Key principles:
            1. **Be constructive**: Focus on helping, not criticizing
            2. **Be specific**: Provide concrete examples and suggestions
            3. **Prioritize**: Critical issues first, then improvements
            4. **Be educational**: Explain the reasoning behind suggestions
            5. **Be thorough**: Cover all aspects of code quality

            For this Python FastAPI MCP server:
            - Focus on modern Python 3.12+ practices
            - Ensure MCP protocol compliance
            - Validate FastAPI implementation patterns
            - Check for security and performance issues
            - Review test coverage and quality

          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: "claude-3-7-sonnet-20250219-beta"
          fallback_model: "claude-3-5-sonnet-20241022"
          max_turns: "5"
          timeout_minutes: "18"

      - name: Extract and Comment PR Review
        if: steps.code-review.outputs.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const executionFile = '${{ steps.code-review.outputs.execution_file }}';
            const executionLog = JSON.parse(fs.readFileSync(executionFile, 'utf8'));

            // Extract the review content from the execution log
            let review = '';

            // Find the last assistant message which should contain the review
            for (let i = executionLog.length - 1; i >= 0; i--) {
              if (executionLog[i].role === 'assistant') {
                review = executionLog[i].content;
                break;
              }
            }

            if (review) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "## 🤖 Claude Code Review\n\n" + review + "\n\n*Automated review generated by Claude Code*"
              });
            }
