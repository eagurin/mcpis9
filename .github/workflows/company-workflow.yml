name: "🏢 Virtual IT Company - Orchestrator"

on:
  issues:
    types: [opened, edited, labeled, unlabeled]
  issue_comment:
    types: [created]

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    name: "🏢 Company Orchestrator - Workflow Coordination"
    steps:
      - uses: actions/checkout@v4

      - name: Workflow Status Monitor
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;

            console.log('🏢 Virtual IT Company Orchestrator');
            console.log('Event:', context.eventName);
            console.log('Action:', context.payload.action);

            if (issue) {
              console.log('Issue #', issue.number, ':', issue.title);
              console.log('Labels:', issue.labels.map(l => l.name).join(', '));
            }

            if (comment) {
              console.log('Comment by:', comment.user.login);
              console.log('Agent workflows will be triggered based on labels and comments');
            }

            // The actual agent workflows are handled by separate files:
            // - project-manager.yml (issues:opened)
            // - tech-lead.yml (when assigned-tech-lead + PM comment)
            // - developer.yml (when assigned-developer + Tech Lead comment)
            // - qa-engineer.yml (when assigned-qa + Developer comment)
            // - tech-lead-final.yml (when assigned-tech-lead-final + QA comment)
            // - devops.yml (when assigned-devops + Tech Lead Final comment)

      - name: Company Status Dashboard
        run: |
          echo "🏢 Virtual IT Company - Workflow Orchestrator"
          echo "================================================"
          echo "👥 AI Agent Team Status:"
          echo "  🧑‍💼 Project Manager: Active (Monitors new issues)"
          echo "  👨‍💻 Tech Lead: Active (Technical analysis & final review)"
          echo "  💻 Developer: Active (Gemini-powered implementation)"
          echo "  🧪 QA Engineer: Active (Testing & validation)"
          echo "  🚀 DevOps: Active (Deployment & monitoring)"
          echo ""
          echo "🔄 Workflow Chain:"
          echo "  Issue → PM Triage → Tech Analysis → Development → QA → Final Review → Deployment"
          echo ""
          echo "📊 System Status: ✅ All agents operational"
          echo "🎯 Ready to process development tasks!"
