name: Claude PR Testing

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "app/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  automated-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Automated Testing with Claude
        id: test-runner
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt: |
            This PR contains changes to Python code or dependencies. Please:

            1. Run the full test suite and analyze any failures
            2. Check code quality with linting and type checking
            3. Verify that new code has appropriate test coverage
            4. Run security scanning if available
            5. If tests fail, analyze the failures and suggest fixes
            6. If tests pass, summarize the test results

            Focus on ensuring code quality and test coverage for this FastAPI project.
          allowed_tools: |
            Bash(make setup)
            Bash(make install)
            Bash(make dev)
            Bash(make lint)
            Bash(make fix)
            Bash(make types)
            Bash(make test)
            Bash(make test-fast)
            Bash(make coverage)
            Bash(make security)
            Bash(make check)
            Bash(pytest)
            Bash(pytest --cov)
            Bash(uv install)
            Bash(uv run pytest)
            View
            GlobTool
            GrepTool
            Edit
            Write
          claude_env: |
            PYTHON_VERSION: 3.12
            UV_PYTHON: 3.12
            PYTHONPATH: /github/workspace
            CI: true
            COVERAGE_REPORT: true
          system_prompt: |
            You are a senior Python developer and testing expert working on a FastAPI project.
            Your goal is to ensure code quality through comprehensive testing and analysis.
            Always run quality checks in this order: setup -> install -> lint -> types -> test -> security.
            If any step fails, analyze the issue and suggest fixes.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: "claude-3-7-sonnet-20250219-beta"
          fallback_model: "claude-3-5-sonnet-20241022"
          max_turns: "10"
          timeout_minutes: "20"

          # Security restrictions
          disallowed_tools: |
            Bash(rm:*)
            Bash(sudo:*)
            Bash(chmod:*)
            Bash(kill:*)
            TaskOutput
            KillTask

      - name: Comment Test Results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const executionFile = '${{ steps.test-runner.outputs.execution_file }}';
            const conclusion = '${{ steps.test-runner.outputs.conclusion }}';

            let comment = '';

            if (fs.existsSync(executionFile)) {
              const executionLog = JSON.parse(fs.readFileSync(executionFile, 'utf8'));

              // Extract the final results
              for (let i = executionLog.length - 1; i >= 0; i--) {
                if (executionLog[i].role === 'assistant') {
                  comment = executionLog[i].content;
                  break;
                }
              }
            }

            const status = conclusion === 'success' ? '✅ Passed' : '❌ Failed';
            const header = `## 🧪 Claude Automated Testing Results - ${status}`;

            if (comment) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: header + "\n\n" + comment + "\n\n*Automated testing by Claude Code*"
              });
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: header + "\n\nTesting execution completed but no detailed results available.\n\n*Automated testing by Claude Code*"
              });
            }
