name: Claude Issue Handler

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  checks: read
  discussions: read
  repository-projects: read
  statuses: read
  id-token: write

jobs:
  handle-claude-request:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Call Claude Agent
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: ${{ github.event.comment.body }}

          # Enable comprehensive tools
          allowed_tools: |
            Edit
            MultiEdit
            Glob
            Grep
            LS
            Read
            Write
            Bash(git:*)
            Bash(make:*)
            Bash(uv:*)
            Bash(pytest:*)
            Bash(python:*)
            Bash(find:*)
            Bash(rg:*)
            Bash(tree:*)

          # Set environment variables
          claude_env: |
            PYTHON_VERSION: 3.12
            UV_PYTHON: 3.12
            PYTHONPATH: /github/workspace
            CI: true
            GITHUB_ACTIONS: true
            PROJECT_TYPE: MCP_SERVER
            FRAMEWORK: FastAPI
            PACKAGE_MANAGER: UV
            TESTING_FRAMEWORK: pytest
            LINTER: ruff
            TYPE_CHECKER: pyright
            FORMATTER: ruff
            SECURITY_SCANNER: bandit

          # Custom system prompt
          system_prompt: |
            You are a skilled Python developer and MCP server expert working on a FastAPI-based project.

            Your role is to help with various development tasks including:
            - Code optimization and refactoring
            - Bug fixes and security improvements
            - API design and implementation
            - Testing and documentation
            - Performance analysis

            Important guidelines:
            1. Always write clean, well-documented code
            2. Follow Python best practices and PEP 8
            3. Use type hints for all functions
            4. Implement proper error handling
            5. Write comprehensive tests
            6. Consider security implications
            7. Optimize for performance when needed

            The project uses modern Python 3.12+ with FastAPI, UV package manager, and pytest for testing.

          # Configuration
          model: "claude-3-5-sonnet-20241022"
          max_turns: "10"
          timeout_minutes: "25"

      - name: Update comment with results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Get the original comment
            const originalComment = context.payload.comment.body;

            // Check if Claude step was successful
            const claudeSuccess = '${{ steps.claude.outputs.conclusion }}' === 'success';

            let responseBody = `## 🤖 Claude Agent Response\n\n`;

            if (claudeSuccess) {
              // Try to read the execution file if it exists
              const executionFile = '${{ steps.claude.outputs.execution_file }}';
              if (executionFile && fs.existsSync(executionFile)) {
                const executionLog = JSON.parse(fs.readFileSync(executionFile, 'utf8'));

                // Find the last assistant message
                for (let i = executionLog.length - 1; i >= 0; i--) {
                  if (executionLog[i].role === 'assistant' && executionLog[i].content) {
                    responseBody += executionLog[i].content;
                    break;
                  }
                }
              } else {
                responseBody += `✅ Claude has processed your request successfully!\n\n`;
                responseBody += `Check the repository for any changes made.`;
              }
            } else {
              responseBody += `❌ Claude encountered an error processing your request.\n\n`;
              responseBody += `Error details: ${{ steps.claude.outputs.error }}`;
            }

            responseBody += `\n\n---\n*Response generated by Claude Agent*`;

            // Create a new comment with the response
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: responseBody
            });
