name: "👨‍💻 Tech Lead - Technical Analysis"

on:
  issue_comment:
    types: [created]

jobs:
  tech-lead-analysis:
    if: |
      contains(github.event.issue.labels.*.name, 'assigned-tech-lead') &&
      contains(github.event.comment.body, '🧑‍💼 Project Manager')
    runs-on: ubuntu-latest
    name: "👨‍💻 Tech Lead - Technical Analysis & Planning"
    steps:
      - uses: actions/checkout@v4

      - name: Tech Lead Analysis
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Assignment to Developer
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'assigned-tech-lead'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['assigned-developer', 'status-development']
            });

      - name: Tech Lead Status Update
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 👨‍💻 Tech Lead - Technical Analysis Complete

            **Status:** ✅ Technical analysis completed
            **Assignment:** Passed to Developer for implementation

            ### Technical Specifications:
            - Architecture decisions reviewed
            - Implementation approach defined
            - Code structure planned
            - Technical requirements clarified

            Next Phase: Development Implementation 🚀

            ---
            _🤖 Virtual IT Company Tech Lead_`
            });
