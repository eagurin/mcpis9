name: "💻 Developer - Code Implementation"

on:
  issue_comment:
    types: [created]

jobs:
  developer-implementation:
    if: |
      contains(github.event.issue.labels.*.name, 'assigned-developer') &&
      contains(github.event.comment.body, '👨‍💻 Tech Lead')
    runs-on: ubuntu-latest
    name: "💻 Developer - Implementation with Gemini"
    steps:
      - uses: actions/checkout@v4

      - name: Developer Implementation with Gemini
        run: |
          echo "💻 Developer: Starting implementation with Gemini AI..."
          echo "📋 Tech Lead specifications received and analyzed"
          echo "🔧 Configuring development environment..."
          echo "⚙️ Implementing solution according to specifications..."
          echo "🧪 Adding comprehensive error handling..."
          echo "📝 Creating detailed documentation..."
          echo "✅ Implementation completed successfully!"

      - name: Code Quality Simulation
        run: |
          echo "💻 Developer: Implementing solution based on Tech Lead specs..."
          echo "✅ Code structure created according to specifications"
          echo "✅ Business logic implemented"
          echo "✅ Error handling added"
          echo "✅ Documentation included"
          echo "✅ Code follows team standards"
          echo "🎯 Ready for QA review!"

      - name: Update Assignment to QA
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'assigned-developer'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['assigned-qa', 'status-testing']
            });

      - name: Developer Status Update
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 💻 Developer - Implementation Complete

            Status: ✅ Code implementation completed with Gemini AI
            Assignment: Passed to QA Engineer for testing

            ### Implementation Summary:
            - ✅ Solution implemented according to Tech Lead specifications
            - ✅ Code structure follows architectural guidelines
            - ✅ Best practices and coding standards applied
            - ✅ Error handling and logging implemented
            - ✅ Documentation and comments added

            Next Phase: Quality Assurance Testing 🧪

            ---
            _🤖 Virtual IT Company Developer (Gemini-powered)_`
            });
