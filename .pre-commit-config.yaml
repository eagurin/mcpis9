# 🪝 Pre-commit configuration for Backend Python App
# Based on 2025 best practices from Medium
# https://gatlenculp.medium.com/effortless-code-quality-the-ultimate-pre-commit-hooks-guide-for-2025-57ca501d9835

repos:
  # 🔒 Security - Prevent secrets from being committed
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
        name: "🔒 security · Detect hardcoded secrets"

  # 📁 Filesystem checks (run first)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # File safety checks
      - id: check-added-large-files
        name: "📁 filesystem · Block large file commits"
        args: ['--maxkb=5000']
      - id: check-merge-conflict
        name: "📁 filesystem · Detect conflict markers"
      - id: check-case-conflict
        name: "📁 filesystem · Check case sensitivity"

      # File format checks
      - id: trailing-whitespace
        name: "📁 filesystem · Remove trailing whitespace"
      - id: end-of-file-fixer
        name: "📁 filesystem · Add newline at end of files"
      - id: mixed-line-ending
        name: "📁 filesystem · Check for mixed line endings"

  # ✅ Data & Config validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: "✅ config · Validate YAML files"
      - id: check-toml
        name: "✅ config · Validate TOML files"
      - id: check-json
        name: "✅ config · Validate JSON files"
      - id: debug-statements
        name: "✅ code · Check for debug statements"

  # 🐍 Python - Modern Ruff replaces Black, Flake8, isort, pyupgrade, bandit
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff-format
        name: "🐍 python · Format with Ruff"
      - id: ruff
        name: "🐍 python · Lint with Ruff"
        args: [--fix]

  # 🐍 Python - Type checking with Microsoft's Pyright (faster than MyPy)
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.390
    hooks:
      - id: pyright
        name: "🐍 python · Type check with Pyright"
        additional_dependencies:
          - pydantic>=2.6.0
          - fastapi>=0.110.0
          - pydantic-settings>=2.0.0
          - uvicorn>=0.22.0
        exclude: ^(tests/|migrations/)

  # 📊 SQL - Format and lint SQL files
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.3.0
    hooks:
      - id: sqlfluff-fix
        name: "📊 SQL · Auto-fix SQL violations"
        args: [--dialect, postgres]

  # 🔧 UV - Modern Python package management
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.7.2
    hooks:
      - id: uv-lock
        name: "🔧 deps · Update uv.lock"
      - id: pip-compile
        name: "🔧 deps · Compile requirements"
        args: [requirements.in, -o, requirements.txt]
        files: ^requirements\.(in|txt)$

  # 🌳 Git - Repository quality
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch
        name: "🌳 git · Protect main branches"
        args: ["--branch", "main", "--branch", "master"]
      - id: forbid-new-submodules
        name: "🌳 git · Prevent submodule creation"

  # ✍️ Commit message standards (Conventional Commits)
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        name: "✍️ commit · Validate message format"
        stages: [commit-msg]

  # 🧪 Local hooks for project-specific checks
  - repo: local
    hooks:
      # Security scan (high severity only)
      - id: bandit-check
        name: "🔒 python · Security scan"
        entry: uv run bandit
        language: system
        types: [python]
        args: [-r, app, -ll, -f, txt]
        exclude: ^tests/
        pass_filenames: false

      # Fast test validation
      - id: pytest-collect
        name: "🧪 test · Validate test structure"
        entry: uv run pytest
        language: system
        types: [python]
        args: [--collect-only, -q]
        pass_filenames: false
        always_run: true

# ⚙️ CI settings optimized for 2025
ci:
  autofix_commit_msg: |
    🔧 [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '🔄 [pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [bandit-check, pytest-collect]  # Skip local hooks in CI
  submodules: false
