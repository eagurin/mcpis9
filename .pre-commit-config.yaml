# 🪝 Конфигурация Pre-commit для Backend Python приложения
# Основано на лучших практиках 2025 года с Medium
# https://gatlenculp.medium.com/effortless-code-quality-the-ultimate-pre-commit-hooks-guide-for-2025-57ca501d9835

repos:
  # 🔒 Безопасность - Предотвращение коммитов секретов
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
        name: "🔒 безопасность · Обнаружение захардкоженных секретов"

  # 📁 Проверки файловой системы (выполняются первыми)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Проверки безопасности файлов
      - id: check-added-large-files
        name: "📁 файлы · Блокировка коммитов больших файлов"
        args: ['--maxkb=5000']
      - id: check-merge-conflict
        name: "📁 файлы · Обнаружение маркеров конфликтов"
      - id: check-case-conflict
        name: "📁 файлы · Проверка чувствительности к регистру"

      # Проверки формата файлов
      - id: trailing-whitespace
        name: "📁 файлы · Удаление пробелов в конце строк"
      - id: end-of-file-fixer
        name: "📁 файлы · Добавление новой строки в конце файлов"
      - id: mixed-line-ending
        name: "📁 файлы · Проверка смешанных окончаний строк"

  # ✅ Валидация данных и конфигурации
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: "✅ конфиг · Валидация YAML файлов"
      - id: check-toml
        name: "✅ конфиг · Валидация TOML файлов"
      - id: check-json
        name: "✅ конфиг · Валидация JSON файлов"
      - id: debug-statements
        name: "✅ код · Проверка отладочных выражений"

  # 🐍 Python - Современный Ruff заменяет Black, Flake8, isort, pyupgrade, bandit
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff-format
        name: "🐍 python · Форматирование с Ruff"
      - id: ruff
        name: "🐍 python · Линтинг с Ruff"
        args: [--fix]

  # 🐍 Python - Проверка типов с Microsoft Pyright (быстрее чем MyPy)
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.390
    hooks:
      - id: pyright
        name: "🐍 python · Проверка типов с Pyright"
        additional_dependencies:
          - pydantic>=2.6.0
          - fastapi>=0.110.0
          - pydantic-settings>=2.0.0
          - uvicorn>=0.22.0
        exclude: ^(tests/|migrations/)

  # 📊 SQL - Форматирование и линтинг SQL файлов
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.3.0
    hooks:
      - id: sqlfluff-fix
        name: "📊 SQL · Авто-исправление нарушений SQL"
        args: [--dialect, postgres]

  # 🔧 UV - Современное управление Python пакетами
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.7.2
    hooks:
      - id: uv-lock
        name: "🔧 зависимости · Обновление uv.lock"
      - id: pip-compile
        name: "🔧 зависимости · Компиляция requirements"
        args: [requirements.in, -o, requirements.txt]
        files: ^requirements\.(in|txt)$

  # 🌳 Git - Качество репозитория
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch
        name: "🌳 git · Защита основных веток"
        args: ["--branch", "main", "--branch", "master"]
      - id: forbid-new-submodules
        name: "🌳 git · Предотвращение создания субмодулей"

  # ✍️ Стандарты сообщений коммитов (Conventional Commits)
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        name: "✍️ коммит · Валидация формата сообщения"
        stages: [commit-msg]

  # 🧪 Локальные хуки для проектных проверок
  - repo: local
    hooks:
      # Сканирование безопасности (только высокая критичность)
      - id: bandit-check
        name: "🔒 python · Сканирование безопасности"
        entry: uv run bandit
        language: system
        types: [python]
        args: [-r, app, -ll, -f, txt]
        exclude: ^tests/
        pass_filenames: false

      # Быстрая валидация тестов
      - id: pytest-collect
        name: "🧪 тесты · Валидация структуры тестов"
        entry: uv run pytest
        language: system
        types: [python]
        args: [--collect-only, -q]
        pass_filenames: false
        always_run: true

# ⚙️ Настройки CI оптимизированные для 2025
ci:
  autofix_commit_msg: |
    🔧 [pre-commit.ci] авто-исправления от pre-commit хуков

    для дополнительной информации, смотрите https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '🔄 [pre-commit.ci] автообновление pre-commit'
  autoupdate_schedule: weekly
  skip: [bandit-check, pytest-collect]  # Пропуск локальных хуков в CI
  submodules: false
