# 🪝 Pre-commit configuration for TypeScript GitHub Action
# Updated for TypeScript/Node.js project

repos:
  # 🔒 Security - Prevent secret commits
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
        name: "🔒 security · Detect hardcoded secrets"

  # 📁 File system checks (run first)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # File security checks
      - id: check-added-large-files
        name: "📁 files · Block large file commits"
        args: ["--maxkb=5000"]
      - id: check-merge-conflict
        name: "📁 files · Detect conflict markers"
      - id: check-case-conflict
        name: "📁 files · Check case sensitivity"

      # File format checks
      - id: trailing-whitespace
        name: "📁 files · Remove trailing whitespace"
      - id: end-of-file-fixer
        name: "📁 files · Add newline at end of files"
      - id: mixed-line-ending
        name: "📁 files · Check mixed line endings"

  # ✅ Data and configuration validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: "✅ config · Validate YAML files"
      - id: check-json
        name: "✅ config · Validate JSON files"

  # 🌳 Git - Repository quality
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch
        name: "🌳 git · Protect main branches"
        args: ["--branch", "main", "--branch", "master"]
      - id: forbid-new-submodules
        name: "🌳 git · Prevent submodule creation"

  # 🧪 Local hooks for project checks
  - repo: local
    hooks:
      # TypeScript tests validation
      - id: bun-test
        name: "🧪 tests · Run TypeScript tests"
        entry: bun test
        language: system
        files: \.(ts|js)$
        pass_filenames: false

# ⚙️ CI settings optimized for 2025
ci:
  autofix_commit_msg: |
    🔧 [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "🔄 [pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: [bun-test] # Skip local hooks in CI
  submodules: false
